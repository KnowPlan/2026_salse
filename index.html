<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>영업관리 시스템</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root{--bg0:#0f0f12;--bg1:#17171e;--bg2:#1c1c26;--bg3:#23232f;--bd:#2d2d3a;--bd2:#363645;--t1:#e8e8ee;--t2:#9393a8;--t3:#64647a;--ac:#6366f1;--ac2:#818cf8;--ok:#34d399;--err:#f87171;--warn:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg2);color:var(--t1);height:100vh;overflow:hidden}
button,input,select,textarea{font-family:inherit;-webkit-app-region:no-drag}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:260px;min-width:260px;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-h{padding:20px 16px 12px;border-bottom:1px solid var(--bd)}.sb-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
.logo-i{width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#0ea5e9);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700}
.sb-u{margin-top:8px;font-size:12px;color:var(--t3);display:flex;align-items:center;gap:6px}
.on-dot{width:7px;height:7px;background:var(--ok);border-radius:50%;display:inline-block}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}.sb-nav::-webkit-scrollbar{width:4px}.sb-nav::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.ns{font-size:11px;font-weight:600;color:var(--t3);padding:12px 16px 4px;letter-spacing:.5px}
.ni{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;color:var(--t2);font-size:13px;transition:all .12s;border-left:2px solid transparent}
.ni:hover{background:rgba(255,255,255,.04)}.ni.a{background:rgba(99,102,241,.1);color:#a5b4fc;border-left-color:#6366f1;font-weight:500}
.ni .ic{width:18px;text-align:center;font-size:14px;opacity:.7}.ni.a .ic{opacity:1}
.ni .bg{margin-left:auto;background:rgba(255,255,255,.08);color:var(--t3);font-size:11px;padding:1px 6px;border-radius:8px}
.ni-s{padding-left:40px!important;font-size:12.5px!important;padding-top:5px!important;padding-bottom:5px!important}
.sd{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mh{padding:14px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;min-height:52px}
.mh h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.mb{flex:1;overflow-y:auto;padding:20px 24px}.mb::-webkit-scrollbar{width:6px}.mb::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.bd{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.card{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:16px;transition:border-color .15s}.card:hover{border-color:var(--bd2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--bg3);color:var(--t1);transition:all .12s}.btn:hover{background:var(--bd)}
.btn-p{background:var(--ac);border-color:var(--ac);color:#fff}.btn-p:hover{opacity:.9}
.btn-d{background:var(--err);border-color:var(--err);color:#fff}.btn-d:hover{opacity:.8}
.btn-s{padding:4px 10px;font-size:11.5px}
.inp{background:var(--bg0);border:1px solid var(--bd);color:var(--t1);border-radius:6px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;width:100%}.inp:focus{border-color:var(--ac)}
textarea.inp{resize:vertical;min-height:80px}
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px}.fg .rq{color:var(--err)}
.kpi{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:16px}
.kpi-l{font-size:11.5px;color:var(--t3);font-weight:500;margin-bottom:6px}.kpi-v{font-size:24px;font-weight:700;letter-spacing:-.5px}.kpi-s{font-size:11px;color:var(--t3);margin-top:4px}
.pw{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;padding-left:15px;padding-top:15px;height:calc(100vh - 160px)}
.pc{min-width:210px;max-width:260px;flex:1;background:var(--bg0);border-radius:10px;padding:12px;display:flex;flex-direction:column;transition:all .2s}
.pc.dov{background:rgba(99,102,241,.12);outline:2px dashed var(--ac)}
.pch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px}
.pcds{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}.pcds::-webkit-scrollbar{width:3px}.pcds::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.pkd{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:12px;cursor:grab;transition:all .12s;user-select:none;-webkit-user-select:none}.pkd:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}.pkd.dg{opacity:.4}
.dt{width:100%;border-collapse:collapse}.dt th{font-size:11.5px;font-weight:600;color:var(--t3);text-align:left;padding:8px 12px;border-bottom:1px solid var(--bd);white-space:nowrap}
.dt td{font-size:13px;padding:10px 12px;border-bottom:1px solid rgba(45,45,58,.5)}.dt tbody tr:hover{background:rgba(255,255,255,.02)}
.clk{cursor:pointer}.clk:hover{color:var(--ac2)}
.tl{position:relative;padding-left:28px}.tl::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--bd)}
.tli{position:relative;margin-bottom:16px}.tld{position:absolute;left:-23px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--bg3);border:2px solid var(--bd2);z-index:1}
.tlc{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:12px 16px}.tlc:hover{border-color:var(--bd2)}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}.tab:hover{color:var(--t2)}.tab.a{color:var(--ac2);border-bottom-color:var(--ac)}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.mod{background:var(--bg3);border:1px solid var(--bd);border-radius:12px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.mod::-webkit-scrollbar{width:4px}.mod::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.mod-h{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}.mod-h h2{font-size:15px;font-weight:600}
.mod-b{padding:20px}.mod-f{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
.cx{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px}.cx:hover{color:var(--t1)}
.fc{display:flex;align-items:center;gap:8px}
.tln{cursor:pointer;color:var(--ac2)}.tln:hover{text-decoration:underline}
.toast{position:fixed;top:20px;right:20px;background:var(--bg3);border:1px solid var(--bd);border-left:3px solid var(--ok);border-radius:8px;padding:12px 20px;z-index:2000;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:si .3s ease}
@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg2);background-image:radial-gradient(ellipse at 30% 50%,rgba(99,102,241,.08) 0%,transparent 70%),radial-gradient(ellipse at 70% 50%,rgba(14,165,233,.06) 0%,transparent 70%)}
.login-box{width:400px;background:var(--bg3);border:1px solid var(--bd);border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-box h1{font-size:22px;font-weight:700;margin-bottom:4px;text-align:center}
.login-box .sub{font-size:13px;color:var(--t3);margin-bottom:28px;text-align:center}
.login-err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--err);margin-bottom:14px;text-align:center}
.pw-wrap{position:relative}.pw-tog{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px}.pw-tog:hover{color:var(--t1)}
.setup-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg2);background-image:radial-gradient(ellipse at 30% 50%,rgba(99,102,241,.08) 0%,transparent 70%)}
.setup-box{width:480px;background:var(--bg3);border:1px solid var(--bd);border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.setup-box h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.setup-box .sub{font-size:13px;color:var(--t3);margin-bottom:24px;text-align:center}
.setup-step{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg0);border:1px solid var(--bd);border-radius:10px;margin-bottom:10px}
.setup-step.done{border-color:var(--ok);background:rgba(52,211,153,.05)}.setup-step.active{border-color:var(--ac);background:rgba(99,102,241,.05)}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--bd);color:var(--t3);flex-shrink:0}
.setup-step.done .step-num{background:var(--ok);color:#fff}.setup-step.active .step-num{background:var(--ac);color:#fff}
.db-mode{display:flex;gap:10px;margin-bottom:20px}.db-mode-btn{flex:1;padding:14px;border-radius:10px;border:1px solid var(--bd);background:var(--bg0);cursor:pointer;text-align:center;transition:all .15s;color:var(--t2)}
.db-mode-btn:hover{border-color:var(--ac)}.db-mode-btn.a{border-color:var(--ac);background:rgba(99,102,241,.1);color:var(--t1)}
.db-mode-btn .ico{font-size:24px;margin-bottom:6px}.db-mode-btn .lbl{font-size:13px;font-weight:600}.db-mode-btn .desc{font-size:11px;color:var(--t3);margin-top:4px}
.gs-wrap{position:relative;flex:1;max-width:420px;margin:0 16px}
.gs-inp{background:var(--bg0);border:1px solid var(--bd);color:var(--t1);border-radius:8px;padding:7px 12px 7px 32px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .15s}.gs-inp:focus{border-color:var(--ac);background:var(--bg2)}
.gs-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}

/* ═══ 파이프라인 우측 상세 패널 ═══ */
.pipe-layout{display:flex;height:100%;overflow:hidden;}
.pipe-main{flex:1;display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease;}
.pipe-panel{
  width:0;min-width:0;overflow:hidden;
  background:var(--bg1);border-left:1px solid var(--bd);
  display:flex;flex-direction:column;
  transition:width .25s ease, min-width .25s ease;
  flex-shrink:0;
}
.pipe-panel.open{width:400px;min-width:340px;}
.pp-head{
  padding:14px 16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.pp-head h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pp-body{flex:1;overflow-y:auto;padding:16px;}
.pp-body::-webkit-scrollbar{width:4px}.pp-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.pp-tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px;flex-shrink:0;overflow-x:auto;}
.pp-tab{padding:7px 12px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;}.pp-tab:hover{color:var(--t2)}.pp-tab.a{color:var(--ac2);border-bottom-color:var(--ac)}
.pp-sect{font-size:11px;font-weight:600;color:var(--t3);margin:14px 0 8px;letter-spacing:.4px;text-transform:uppercase;}
.pp-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.pp-kpi{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;}
.pp-kpi .lbl{font-size:10.5px;color:var(--t3);margin-bottom:4px;}
.pp-kpi .val{font-size:16px;font-weight:700;}
.pp-kpi .sub{font-size:10px;color:var(--t3);margin-top:3px;}
.pp-info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(45,45,58,.4);font-size:12.5px;}
.pp-info-row:last-child{border-bottom:none;}
.pp-info-row .k{color:var(--t3);}
.pp-info-row .v{color:var(--t1);font-weight:500;text-align:right;}
.pp-act-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(45,45,58,.4);font-size:12.5px;}
.pp-act-item:last-child{border-bottom:none;}
.pp-act-ico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.pp-stg-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.pp-stg-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;background:var(--bg3);}
.pp-stg-btn.cur{border-color:var(--ac);background:rgba(99,102,241,.15);color:#a5b4fc;}
.pp-stg-btn:hover:not(.cur){border-color:var(--bd2);color:var(--t1);}
.pp-action-bar{padding:12px 16px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;background:var(--bg1);}

@media(max-width:900px){
  .pipe-panel.open{width:100%!important;min-width:0!important;position:fixed;inset:0;z-index:300;border-left:none;}
}
.gs-clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px;display:none}.gs-clr:hover{color:var(--t1)}
.gs-inp:not(:placeholder-shown)~.gs-clr{display:block}
.sr-cat{font-size:12px;font-weight:600;color:var(--t3);padding:12px 0 6px;border-bottom:1px solid var(--bd);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sr-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .1s;font-size:13px}.sr-item:hover{background:rgba(255,255,255,.04)}
.sr-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sr-hl{background:rgba(99,102,241,.25);color:#c7d2fe;border-radius:2px;padding:0 1px}
.sr-empty{text-align:center;padding:40px 20px;color:var(--t3)}
.sr-stats{font-size:12px;color:var(--t3);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sr-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);transition:all .12s}.sr-tag:hover{border-color:var(--ac)}.sr-tag.a{background:rgba(99,102,241,.15);border-color:var(--ac);color:var(--ac2)}
.kbd{display:inline-flex;align-items:center;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(255,255,255,.06);color:var(--t3);border:1px solid var(--bd);font-family:monospace}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}

/* ═══ RESPONSIVE ═══ */

/* 오버레이 (사이드바 열릴 때 배경 딤처리) */
.sb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:200;
  backdrop-filter:blur(3px);
  transition:opacity .25s;
}
.sb-overlay.open{display:block}

/* 햄버거 버튼 - 기본 숨김, 모바일에서만 표시 */
.mob-menu-btn{
  display:none;
  background:none;border:none;
  color:var(--t1);cursor:pointer;
  width:36px;height:36px;
  border-radius:8px;
  flex-shrink:0;
  align-items:center;justify-content:center;
  font-size:18px;
  transition:background .12s;
}
.mob-menu-btn:hover{background:rgba(255,255,255,.08)}

/* Ctrl+K 힌트 */
.kbd-hint{display:flex;align-items:center;gap:6px}

/* 하단 탭바 */
.bot-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg1);
  border-top:1px solid var(--bd);
  z-index:150;
  height:calc(56px + env(safe-area-inset-bottom,0));
  padding-bottom:env(safe-area-inset-bottom,0);
}
.bot-nav-inner{display:flex;height:56px;width:100%;justify-content:space-around;align-items:stretch}
.bn-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:5px;cursor:pointer;
  color:var(--t3);
  transition:color .15s;
  padding:4px 8px;
  max-width:25%;
  -webkit-tap-highlight-color:transparent;
}
.bn-item.a{color:var(--ac2)}
.bn-item .bn-ic{display:flex;align-items:center;justify-content:center;line-height:1}
.bn-item .bn-lb{font-size:10px;font-weight:500}

/* ── 모바일 레이아웃 (≤900px) ── */
@media(max-width:900px){
  body{overflow:hidden;height:100svh}

  /* 앱 전체: 화면 꽉 채우기 */
  .app{
    display:flex;flex-direction:column;
    width:100%;height:100svh;
    overflow:hidden;position:relative;
  }

  /* 사이드바: 평소 화면 밖 숨김, 슬라이드 인/아웃 */
  .sb{
    position:fixed;
    left:0;top:0;bottom:0;
    z-index:201;
    width:280px!important;min-width:280px!important;
    transform:translateX(-100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    box-shadow:none;
  }
  .sb.mob-open{
    transform:translateX(0);
    box-shadow:6px 0 32px rgba(0,0,0,.5);
  }
  .sb-close-btn{display:flex!important}

  /* 메인 영역: 남은 높이 전부 차지, 내부 스크롤 */
  .mn{
    flex:1;
    display:flex;flex-direction:column;
    overflow:hidden;
    height:100svh;
  }

  /* 검색바 고정 */
  .mh{padding:10px 14px;flex-wrap:wrap;gap:6px;flex-shrink:0}

  /* 햄버거/힌트 */
  .mob-menu-btn{display:flex}
  .kbd-hint{display:none!important}
  .gs-wrap{max-width:none!important;margin:0 6px!important;flex:1}

  /* 본문 영역: 세로 스크롤, 하단 탭바 높이만큼 padding */
  .mb{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    padding:14px 14px 72px!important;
    -webkit-overflow-scrolling:touch;
  }

  /* 테이블: 콘텐츠 사이즈에 맞춰 자동 조정, 넘치면 가로 스크롤 */
  .dt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .dt{width:100%;min-width:0;table-layout:auto}
  .dt th,.dt td{white-space:nowrap;font-size:12px;padding:8px 10px}

  /* 파이프라인 컨테이너: 가로 스크롤 제거, 리스트 뷰로 전환 */
  .pipe-wrap{ display:none; }

  /* ── 파이프라인 모바일 리스트 뷰 ── */
  .mob-pipe-wrap{
    flex:1;overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:12px 14px 72px;
  }
  .mob-stg-hd{
    display:flex;align-items:center;gap:8px;
    padding:10px 14px;
    background:var(--bg3);
    border:1px solid var(--bd);
    border-radius:10px;
    margin-bottom:6px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    transition:background .12s;

// ═══ PIPELINE (Drag & Drop + Touch) ═══
// ─ 터치 드래그 상태 ─
const _TD = {
  active: false,    // 드래그 진행 중 여부
  srcId: null,      // 드래그 중인 ctx.id
  el: null,         // 원본 카드 DOM
  ghost: null,      // 고스트(복제) DOM
  startX: 0, startY: 0,  // 터치 시작 좌표
  offsetX: 0, offsetY: 0, // 손가락-카드 중심 오프셋
  timer: null,      // 롱프레스 타이머
  didDrag: false,   // 실제 드래그 발생 여부 (클릭 구분용)
};

// 특정 좌표에서 pc 컬럼 stg id 반환
function _tdGetStg(x, y) {
  if (_TD.ghost) _TD.ghost.style.display = 'none';
  const els = document.elementsFromPoint(x, y);
  if (_TD.ghost) _TD.ghost.style.display = '';
  const col = els.find(e => e.classList && e.classList.contains('pc'));
  return col ? col.dataset.stg : null;
}

// 고스트 생성
function _tdStartDrag(cd, ctxId) {
  const rect = cd.getBoundingClientRect();
  _TD.active = true;
  _TD.didDrag = true;
  _TD.el = cd;
  cd.classList.add('dg');

  const ghost = cd.cloneNode(true);
  ghost.style.cssText = [
    'position:fixed',
    'left:' + rect.left + 'px',
    'top:' + rect.top + 'px',
    'width:' + rect.width + 'px',
    'z-index:9999',
    'pointer-events:none',
    'opacity:0.9',
    'border-radius:8px',
    'box-shadow:0 12px 32px rgba(0,0,0,.5)',
    'transform:scale(1.05)',
    'transition:none',
    'background:var(--bg3)',
    'border:1.5px solid var(--ac)',
    'padding:12px',
  ].join(';');
  document.body.appendChild(ghost);
  _TD.ghost = ghost;
}

// 고스트 이동
function _tdMoveGhost(x, y) {
  if (!_TD.ghost) return;
  _TD.ghost.style.left = (x - _TD.offsetX) + 'px';
  _TD.ghost.style.top  = (y - _TD.offsetY) + 'px';
}

// 드래그 종료 정리
function _tdCleanup() {
  clearTimeout(_TD.timer);
  _TD.active = false;
  if (_TD.ghost) { _TD.ghost.remove(); _TD.ghost = null; }
  if (_TD.el)    { _TD.el.classList.remove('dg'); _TD.el = null; }
  document.querySelectorAll('.pc.dov').forEach(c => c.classList.remove('dov'));
}

// 터치 이벤트 등록
function _makeTouchDrag(cd, ctxId) {
  cd.addEventListener('touchstart', e => {
    const t = e.touches[0];
    _TD.srcId   = ctxId;
    _TD.didDrag = false;
    _TD.startX  = t.clientX;
    _TD.startY  = t.clientY;

    // 롱프레스 200ms 후 드래그 시작
    _TD.timer = setTimeout(() => {
      const rect = cd.getBoundingClientRect();
      _TD.offsetX = t.clientX - rect.left;
      _TD.offsetY = t.clientY - rect.top;
      _tdStartDrag(cd, ctxId);
      // 진동 피드백 (지원 기기)
      if (navigator.vibrate) navigator.vibrate(40);
    }, 200);
  }, { passive: true });

  cd.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = t.clientX - _TD.startX;
    const dy = t.clientY - _TD.startY;

    if (!_TD.active) {
      // 드래그 시작 전 많이 움직이면 타이머 취소 → 스크롤 허용
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        clearTimeout(_TD.timer);
      }
      return;
    }

    e.preventDefault(); // 드래그 중 스크롤 차단
    _tdMoveGhost(t.clientX, t.clientY);

    // 컬럼 하이라이트
    const stgId = _tdGetStg(t.clientX, t.clientY);
    document.querySelectorAll('.pc').forEach(c => {
      c.classList.toggle('dov', c.dataset.stg === stgId && stgId != null);
    });
  }, { passive: false });

  cd.addEventListener('touchend', e => {
    if (!_TD.active) { _tdCleanup(); return; }
    const t = e.changedTouches[0];
    const stgId = _tdGetStg(t.clientX, t.clientY);
    _tdCleanup();

    if (stgId && _TD.srcId) {
      const ctx = D.ctxs.find(c => c.id === _TD.srcId);
      if (ctx && ctx.stage !== stgId) {
        const os = ctx.stage;
        ctx.stage = stgId;
        syncUpdateSheet('ctxs', ctx.id, ctx);
        addAct(ctx.id, 'STAGE_CHANGED',
          '단계 변경: ' + (gSt(os)?.l || '') + ' → ' + (gSt(stgId)?.l || ''));
        toast('단계 변경 완료');
        render();
      }
    }
    _TD.srcId = null;
  });

  cd.addEventListener('touchcancel', _tdCleanup);
}

function pgPipe(){
  const sol=gS(D.ss);if(!sol)return h('div','솔루션 선택');
  const yr=D.pipeYear;const years=new Set();D.ctxs.forEach(c=>{if(c.yr){const y=Number(c.yr);if(!isNaN(y))years.add(y);}});
  years.add(new Date().getFullYear());const yrArr=[...years].sort((a,b)=>b-a);
  const sc=D.ctxs.filter(c=>{if(c.sid!==D.ss)return false;if(!yr)return true;return Number(c.yr)===yr;});
  const panelCtx=D.pipePanel?D.ctxs.find(c=>c.id===D.pipePanel):null;
  const isMob=window.innerWidth<=900;

  // ── 공통 헤더 ──
  const header=h('div',{className:'mh'},
    h('h1',h('span',{className:'sd',style:{background:sol.color,width:'10px',height:'10px'}}),' '+sol.name+' 파이프라인'),
    h('div',{className:'fc',style:{gap:'8px'}},
      h('select',{className:'inp',style:{width:'auto',padding:'4px 8px',fontSize:'12px'},onChange:e=>{D.pipeYear=e.target.value?Number(e.target.value):null;render();}},
        h('option',{value:'',selected:!yr},'전체 연도'),...yrArr.map(y=>h('option',{value:String(y),selected:yr===y},y+'년'))),
      !isMob?h('span',{style:{fontSize:'12px',color:'var(--t3)'}},'총 '+sc.length+'건 · '+fmt(sc.filter(c=>!['closed','lost'].includes(c.stage)).reduce((s,c)=>s+Number(c.amt),0))+'원'):null,
      D.pipePanel&&!isMob?h('button',{className:'btn btn-s',style:{fontSize:'11px'},onClick:()=>{D.pipePanel=null;render();}},'패널 닫기'):null));

  // ── 모바일: 리스트 뷰 ──
  if(isMob){
    if(!D._mobPipeExp)D._mobPipeExp={};
    // 기본으로 빈 단계 제외하고 첫 단계 펼치기
    const hasItems=stgId=>sc.some(c=>c.stage===stgId);
    STG.forEach(s=>{if(D._mobPipeExp[s.id]===undefined)D._mobPipeExp[s.id]=hasItems(s.id);});

    const listWrap=h('div',{className:'mob-pipe-wrap'});

    // 요약 바
    const activeAmt=sc.filter(c=>!['closed','lost'].includes(c.stage)).reduce((s,c)=>s+Number(c.amt),0);
    listWrap.appendChild(h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px',fontSize:'12px',color:'var(--t3)',flexWrap:'wrap'}},
      h('span',{style:{fontWeight:600,color:'var(--t1)'}},sc.length+'건'),
      h('span','진행 '+sc.filter(c=>!['closed','lost'].includes(c.stage)).length+'건'),
      h('span','·'),
      h('span',{style:{color:'var(--ac2)',fontWeight:600}},fmt(activeAmt)+'원')));

    STG.forEach(stg=>{
      const items=sc.filter(c=>resolveStage(c.stage)===stg.id);
      const isOpen=D._mobPipeExp[stg.id];

      // 섹션 헤더
      const hd=h('div',{className:'mob-stg-hd'+(isOpen?' open':'')},
        h('span',{style:{color:stg.c,fontSize:'14px'}},stg.i),
        h('span',{style:{fontWeight:600,fontSize:'13px',color:'var(--t2)'}},stg.l),
        h('span',{style:{fontSize:'11px',padding:'1px 8px',borderRadius:'8px',background:'rgba(255,255,255,.07)',color:'var(--t3)'}},String(items.length)),
        items.length>0?h('span',{style:{fontSize:'11px',color:'var(--t3)',marginLeft:'2px'}},fmt(items.reduce((s,c)=>s+Number(c.amt),0))+'원'):null,
        stg.id==='lead'?h('button',{className:'btn btn-p btn-s',style:{marginLeft:'auto',fontSize:'11px',padding:'3px 10px'},onClick:e=>{e.stopPropagation();D.modal={type:'context',sid:D.ss};render();}},'+ 등록'):null,
        h('span',{className:'stg-arrow',style:{marginLeft:stg.id==='lead'?'6px':'auto'}},'▼'));
      hd.addEventListener('click',()=>{D._mobPipeExp[stg.id]=!D._mobPipeExp[stg.id];render();});
      listWrap.appendChild(hd);

      if(isOpen){
        const body=h('div',{className:'mob-stg-body'});
        if(items.length===0){
          body.appendChild(h('div',{className:'mob-stg-empty'},stg.i+' 항목 없음'));
        } else {
          items.forEach(ctx=>{
            const cu=D.custs.find(c=>c.id===ctx.cid);
            const isSelected=D.pipePanel===ctx.id;
            const card=h('div',{className:'mob-pkd'+(isSelected?' selected':'')},
              h('div',{className:'mob-pkd-top'},
                h('span',{className:'mob-pkd-name'},cu?.name||'?'),
                h('span',{className:'mob-pkd-amt'},fmt(ctx.amt)+'원')),
              ctx.desc?h('div',{className:'mob-pkd-desc'},ctx.desc):null,
              h('div',{className:'mob-pkd-meta'},
                h('span','👤 '+(gU(ctx.oid)?.name||'-')),
                ctx.ecd?h('span','📅 '+fmtD(ctx.ecd)):null,
                isSelected?h('span',{style:{marginLeft:'auto',color:'var(--ac2)',fontWeight:600}},'✓ 선택됨'):null));
            card.addEventListener('click',()=>{
              D.pipePanel=D.pipePanel===ctx.id?null:ctx.id;
              D.ppTab='info';
              render();
            });
            body.appendChild(card);
          });
        }
        listWrap.appendChild(body);
      }
    });

    return h('div',{style:{display:'flex',flexDirection:'column',height:'100%'}},
      header,
      listWrap,
      panelCtx?renderPipePanel(panelCtx):null);
  }

  // ── 데스크탑: 기존 칸반 뷰 ──
  const pipeMain=h('div',{className:'pipe-main'});
  pipeMain.appendChild(header);
  pipeMain.appendChild(h('div',{className:'pipe-wrap'},
    h('div',{className:'pw'},
      ...STG.map(stg=>{
        const items=sc.filter(c=>resolveStage(c.stage)===stg.id);
        const col=h('div',{className:'pc'});
        col.dataset.stg=stg.id;
        col.appendChild(h('div',{className:'pch'},
          h('span',{style:{fontSize:'12.5px',fontWeight:600,color:'var(--t2)',display:'flex',alignItems:'center',gap:'6px'}},
            h('span',{style:{color:stg.c}},stg.i),' '+stg.l),
          h('span',{style:{fontSize:'11px',color:'var(--t3)',background:'rgba(255,255,255,.06)',padding:'1px 7px',borderRadius:'8px'}},
            String(items.length)),
          stg.id==='lead'?h('button',{className:'btn btn-p btn-s',style:{marginLeft:'auto',fontSize:'11px',padding:'2px 8px',lineHeight:'1.4'},onClick:e=>{e.stopPropagation();D.modal={type:'context',sid:D.ss};render();}},'+ 등록'):null));
        const pcds=h('div',{className:'pcds'});
        items.forEach(ctx=>{
          const cu=D.custs.find(c=>c.id===ctx.cid);
          const isSelected=D.pipePanel===ctx.id;
          const cd=h('div',{className:'pkd',draggable:true,style:isSelected?{borderColor:'var(--ac)',background:'rgba(99,102,241,.08)'}:{}},
            h('div',{style:{fontSize:'13px',fontWeight:600,marginBottom:'4px',display:'flex',alignItems:'center',gap:'6px'}},
              cu?.name||'?',
              isSelected?h('span',{style:{fontSize:'10px',padding:'1px 6px',borderRadius:'8px',background:'var(--ac)',color:'#fff'}},'선택'):null),
            h('div',{style:{fontSize:'11.5px',color:'var(--t3)',marginBottom:'8px',lineHeight:'1.4'}},ctx.desc||''),
            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'var(--t3)'}},
              h('span',{style:{fontWeight:600,color:'var(--t2)'}},fmt(ctx.amt)+'원'),
              h('span',gU(ctx.oid)?.name||'')));
          cd.addEventListener('dragstart',e=>{D.di=ctx.id;cd.classList.add('dg');e.dataTransfer.setData('text/plain',ctx.id);});
          cd.addEventListener('dragend',()=>cd.classList.remove('dg'));
          cd.addEventListener('click',()=>{
            if(!_TD.didDrag){
              D.pipePanel=D.pipePanel===ctx.id?null:ctx.id;
              D.ppTab='info';
              render();
            }
          });
          _makeTouchDrag(cd, ctx.id);
          pcds.appendChild(cd);
        });
        if(items.length===0)
          pcds.appendChild(h('div',{style:{textAlign:'center',padding:'20px',color:'var(--t3)',fontSize:'11px'}},stg.i+'\n항목 없음'));
        col.appendChild(pcds);
        col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('dov');});
        col.addEventListener('dragleave',()=>col.classList.remove('dov'));
        col.addEventListener('drop',e=>{
          e.preventDefault();col.classList.remove('dov');
          const cid=e.dataTransfer.getData('text/plain');
          const old=D.ctxs.find(c=>c.id===cid);
          if(!old||old.stage===stg.id)return;
          const os=old.stage;old.stage=stg.id;
          syncUpdateSheet('ctxs',cid,old);
          addAct(cid,'STAGE_CHANGED','단계 변경: '+(gSt(os)?.l||'')+' → '+stg.l);
          toast('단계 변경 완료');render();});
        return col;
      }))));

  return h('div',{style:{display:'flex',flexDirection:'column',height:'100%'}},
    h('div',{className:'pipe-layout'},
      pipeMain,
      panelCtx?renderPipePanel(panelCtx):h('div',{className:'pipe-panel'})));

  const match=(str)=>str&&String(str).toLowerCase().includes(q);

  // Search across all data
  const rCusts=q?D.custs.filter(c=>match(c.name)||match(c.cn)||match(c.ph)||match(c.em)||match(c.addr)||match(c.memo)):[];

function renderModal(){
  const m=D.modal;if(!m)return null;
  const close=()=>{D.modal=null;render();};
  const ov=(title,body,onSave)=>{
    const o=h('div',{className:'mov'},h('div',{className:'mod'},
      h('div',{className:'mod-h'},h('h2',title),h('button',{className:'cx',onClick:close},'✕')),
      h('div',{className:'mod-b'},body),
      onSave?h('div',{className:'mod-f'},h('button',{className:'btn',onClick:close},'취소'),h('button',{className:'btn btn-p',onClick:onSave},'저장')):null));
    o.addEventListener('click',e=>{if(e.target===o)close();});return o;};
  const fg=(label,input,req)=>h('div',{className:'fg'},h('label',label,req?h('span',{className:'rq'},' *'):null),input);
  const f={};const gf=k=>f[k]||'';

  // Profile Edit
  if(m.type==='profile'){
    const u=D.curUser;
    Object.assign(f,{name:u.name||'',loginId:u.loginId||'',pw:'',pwConfirm:''});
    const doSave=()=>{
      if(!f.name){toast('이름을 입력하세요');return;}
      if(f.pw&&f.pw!==f.pwConfirm){toast('비밀번호가 일치하지 않습니다');return;}
      u.name=f.name;
      if(f.pw)u.pw=f.pw;
      const idx=D.users.findIndex(x=>x.id===u.id);
      if(idx!==-1)D.users[idx]=u;
      close();toast('정보가 수정되었습니다');
    };
    return ov('내 정보 수정',h('div',
      fg('이름',h('input',{className:'inp',value:f.name,onInput:e=>{f.name=e.target.value;}}),1),
      fg('아이디',h('input',{className:'inp',value:f.loginId,disabled:'disabled',style:{opacity:.6}})),
      fg('새 비밀번호',h('div',{className:'pw-wrap'},h('input',{className:'inp',type:'password',placeholder:'변경하려면 입력하세요',style:{paddingRight:'36px'},onInput:e=>{f.pw=e.target.value;}}),h('button',{className:'pw-tog',onClick:(e)=>{const inp=e.target.previousElementSibling;inp.type=inp.type==='password'?'text':'password';e.target.textContent=inp.type==='password'?'👁️':'🙈';}},'👁️'))),
      fg('비밀번호 확인',h('div',{className:'pw-wrap'},h('input',{className:'inp',type:'password',placeholder:'비밀번호를 다시 입력하세요',style:{paddingRight:'36px'},onInput:e=>{f.pwConfirm=e.target.value;}}),h('button',{className:'pw-tog',onClick:(e)=>{const inp=e.target.previousElementSibling;inp.type=inp.type==='password'?'text':'password';e.target.textContent=inp.type==='password'?'👁️':'🙈';}},'👁️')))
    ),doSave);}

  // Customer
  if(m.type==='customer'||m.type==='custedit'){
    const isE=m.type==='custedit';const d=isE?m.data:{};
    Object.assign(f,{name:d.name||'',cn:d.cn||'',ph:d.ph||'',em:d.em||'',addr:d.addr||'',type:d.type||'new',memo:d.memo||''});
    return ov(isE?'고객 수정':'고객 등록',h('div',

// ═══ DB ABSTRACTION LAYER ═══
async function apiRequest(method,url,body){
  try{
    const options={method};
    if(body!==undefined){options.headers={'Content-Type':'application/json'};options.body=JSON.stringify(body);}
    const r=await fetch(url,options);
    let d=null;
    try{d=await r.json();}catch(e){d=null;}
    if(!r.ok||(d&&d.success===false))return {ok:false,status:r.status,error:(d&&d.error)||('HTTP '+r.status)};
    return {ok:true,status:r.status,data:d};
  }catch(e){return {ok:false,status:0,error:e.message||'Network error'};}
}
var API={
  mode:'local', // 'local' or 'sheets'
  async checkAuth(){try{const r=await fetch('/api/auth/status');return await r.json();}catch(e){return {authenticated:false};}},
  async startAuth(clientId,clientSecret){const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId,clientSecret})});return await r.json();},
  async setupSheet(spreadsheetId){const r=await fetch('/api/auth/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({spreadsheetId:spreadsheetId||null})});return await r.json();},
  async disconnect(){await fetch('/api/auth/disconnect',{method:'POST'});API.mode='local';clearPersistedAuth();clearPersistedNav();},
  async getSheetUrl(){try{const r=await fetch('/api/spreadsheet-url');const d=await r.json();return d.url;}catch(e){return null;}},

  // CRUD - proxies to either local D object or REST API
  async get(sheet){
    if(API.mode==='local') return null; // use D directly
    const res=await apiRequest('GET','/api/db/'+sheet);
    return res.ok&&res.data&&res.data.success?res.data.data:null;
  },
  async add(sheet,data){
    if(API.mode==='local') return {ok:true,local:true};
    return apiRequest('POST','/api/db/'+sheet,data);
  },
  async update(sheet,id,data){
    if(API.mode==='local') return {ok:true,local:true};
    return apiRequest('PUT','/api/db/'+sheet+'/'+id,data);
  },
  async del(sheet,id){
    if(API.mode==='local') return {ok:true,local:true};
    return apiRequest('DELETE','/api/db/'+sheet+'/'+id);
  }
};

// Sheet name mapping (D key -> Sheet name)
var SM={sols:'Solutions',custs:'Customers',ctxs:'SalesContexts',acts:'Activities',cts:'Contracts',revs:'Revenues',users:'Users'};
// Field mapping (D short keys -> Sheet full keys)
var FM={
  custs:{cn:'contactName',ph:'phone',em:'email',addr:'address',ca:'createdAt'},
  ctxs:{cid:'customerId',sid:'solutionId',oid:'ownerId',amt:'expectedAmount',ecd:'expectedCloseDate',yr:'salesYear',desc:'description'},
  acts:{scid:'salesContextId',ct:'content',oid:'ownerId',ca:'createdAt'},
  cts:{scid:'salesContextId',amt:'amount',sd:'startDate',ed:'endDate',st:'status'},
  revs:{ctid:'contractId',amt:'amount',rd:'revenueDate',st:'status'},
  sols:{desc:'description',ca:'createdAt'},
  users:{ca:'createdAt'}
};

function toSheet(key,obj){
  const map=FM[key]||{};const out={};
  Object.entries(obj).forEach(([k,v])=>{out[map[k]||k]=v;});
  return out;
}
function fromSheet(key,obj){
  const map=FM[key]||{};const rev={};
  Object.entries(map).forEach(([k,v])=>{rev[v]=k;});
  const out={};Object.entries(obj).forEach(([k,v])=>{out[rev[k]||k]=v;});
  return out;
}

async function loadAllFromSheets(){
  for(const [dk,sn] of Object.entries(SM)){
    const rows=await API.get(sn);
    if(rows){
      let mapped=rows.map(r=>fromSheet(dk,r));
      if(dk==='users') mapped=mapped.map(normalizeUserRow).filter(u=>normAuth(u.loginId)&&normAuth(u.pw));
      D[dk]=mapped;
      // Convert numeric fields
      if(dk==='ctxs')D[dk].forEach(r=>{r.amt=Number(r.amt)||0;});
      if(dk==='cts')D[dk].forEach(r=>{r.amt=Number(r.amt)||0;});
      if(dk==='revs')D[dk].forEach(r=>{r.amt=Number(r.amt)||0;});
    }
  }
}

function rebindCurrentUser(){
  if(!D.curUser)return true;
  const fresh=D.users.find(u=>u.id===D.curUser.id)||D.users.find(u=>normAuth(u.loginId)===normAuth(D.curUser.loginId));
  if(fresh&&!isInactiveUser(fresh)){D.curUser=fresh;return true;}
  D.loggedIn=false;D.curUser=null;D.loginErr='세션이 만료되었습니다.';clearPersistedAuth();clearPersistedNav();
  return false;
}

async function handleSyncResult(action,result){
  if(result&&result.ok)return result;
  if(API.mode!=='sheets')return result||{ok:false,error:'요청 실패'};
  toast(action+' 실패: '+((result&&result.error)||'동기화 오류'));
  try{
    await loadAllFromSheets();
    rebindCurrentUser();
  }catch(e){}
  render();
  return result||{ok:false,error:'요청 실패'};
}

async function syncToSheet(dk,data){
  if(API.mode!=='sheets')return {ok:true,local:true};
  const sn=SM[dk];if(!sn)return {ok:false,error:'시트 매핑 없음'};
  const result=await API.add(sn,toSheet(dk,data));
  return handleSyncResult('저장',result);
}
async function syncUpdateSheet(dk,id,data){
  if(API.mode!=='sheets')return {ok:true,local:true};
  const sn=SM[dk];if(!sn)return {ok:false,error:'시트 매핑 없음'};
  const result=await API.update(sn,id,toSheet(dk,data));
  return handleSyncResult('수정',result);
}
async function syncDeleteSheet(dk,id){
  if(API.mode!=='sheets')return {ok:true,local:true};
  const sn=SM[dk];if(!sn)return {ok:true};
  try{
    const result=await API.del(sn,id);
    return handleSyncResult('삭제',result);
  }catch(e){console.error('삭제 동기화 오류:',e);return {ok:true,syncError:true};}
}

      ):null,
      h('div',{className:'setup-step'+(C.step===3?' active':'')+(C.step>3?' done':'')},
        h('div',{className:'step-num'},'3'),
        h('div',{style:{flex:1}},h('div',{style:{fontSize:'13px',fontWeight:600}},'스프레드시트 연결'),
          h('div',{style:{fontSize:'11px',color:'var(--t3)'}},'새 창 안내에 따라 Vercel 환경변수 등록 후 Redeploy'))),
      null,
      h('div',{style:{marginTop:'16px',textAlign:'center'}},
        h('button',{style:{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:'12px',textDecoration:'underline'},onClick:()=>{D._skipSetup=true;render();}},'나중에 설정하기 (로컬 모드로 계속)'))
    )
  );
}

// ═══ INIT ═══
async function init(){
  let authStatus=null;
  try{
    authStatus=await API.checkAuth();
    if(authStatus.authenticated&&authStatus.spreadsheetId){
      API.mode='sheets';
      await loadAllFromSheets();
      if(restoreSessionFromStorage()){render();return;}
      D.pg='dashboard';render();return;
    }
  }catch(e){}
  // No sheets connection - start in local mode, show login directly
  API.mode='local';
  if(restoreSessionFromStorage()){render();return;}
  render(); // shows login screen
}
init();
let _resizeT;window.addEventListener('resize',()=>{clearTimeout(_resizeT);_resizeT=setTimeout(()=>{if(D.loggedIn)render();},200);});

</script>
